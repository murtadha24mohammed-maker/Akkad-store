<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخزن الملفات السحابي العالمي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 600px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        h2 { color: #1055c0; margin-bottom: 25px; }
        .file-label {
            display: inline-block;
            padding: 14px 28px;
            background-color: #1055c0;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .file-label:hover { background-color: #0c3d8a; }
        input[type="file"] { display: none; }
        
        .result-box {
            display: none;
            background: #e9f5ff;
            border: 1px dashed #1055c0;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: right;
        }
        .url-text {
            background: #fff;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            word-break: break-all;
            font-family: monospace;
            margin: 10px 0;
            display: block;
        }
        .action-btn {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
            text-decoration: none;
            display: inline-block;
        }
        .action-btn.copy { background-color: #17a2b8; }
        .status { margin-top: 15px; color: #666; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <a href="page 9.html" style="padding: 6px 12px; background-color: #00bfff; color: white; text-decoration: none; border-radius: 10px;"><b> من نحن  </b></a>&nbsp;
    
<div class="container">
    <h2>☁️ مخزن ومستدعي الملفات السحابي العالمي</h2>
    <p style="color: #666; font-size: 14px;">ارفع أي ملف (RAR, PDF, صور) من هنا واحصل على رابط التنزيل المباشر لأي جهاز آخر.</p>
    
    <label for="cloudInput" class="file-label">اضغط هنا لرفع ملف 📤</label>
    <input type="file" id="cloudInput" accept=".rar, .zip, .pdf, .txt, .doc, .docx, image/*">
    <div class="status" id="uploadStatus"></div>

    <div class="result-box" id="resultBox">
        <strong style="color: #1055c0;">🎉 تم رفع وتخزين الملف على السحابة بنجاح!</strong>
        <p style="font-size: 14px; color: #333; margin: 5px 0;">اسم الملف: <span id="resFileName" style="font-weight: bold;"></span></p>
        <span class="url-text" id="fileUrl"></span>
        
        <button class="action-btn copy" id="copyBtn">نسخ رابط الملف 📋</button>
        <a href="" class="action-btn" id="downloadLink" rel="noreferrer">تنزيل الملف فوراً 📥</a>
    </div>
</div>

<script>
    // ضع الرموز الخاصة بحسابك هنا لكي يعمل الكود بنجاح
    const CLOUD_NAME = "dbfbnxrwr"; 
    const UPLOAD_PRESET = "cwxgcdkw"; 

    const cloudInput = document.getElementById('cloudInput');
    const uploadStatus = document.getElementById('uploadStatus');
    const resultBox = document.getElementById('resultBox');
    const fileUrl = document.getElementById('fileUrl');
    const resFileName = document.getElementById('resFileName');
    const downloadLink = document.getElementById('downloadLink');
    const copyBtn = document.getElementById('copyBtn');

    cloudInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        uploadStatus.innerHTML = `⏳ جاري رفع وتأمين المستند على السيرفر السحابي العالمي...`;
        resultBox.style.display = "none";

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/raw/upload`, {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.secure_url) {
                uploadStatus.innerHTML = "<span style='color: green;'>✅ تم الحفظ والاستدعاء بنجاح!</span>";
                
                // هندسة إجبار التحميل: نقوم بتعديل الرابط السحابي ليحتوي على أمر التنزيل المباشر كملف مرفق
                let finalUrl = data.secure_url;
                if(finalUrl.includes("/raw/upload/")) {
                    // إضافة تلميح للسيرفر بجعل الملف قابلاً للتحميل المباشر (Attachment)
                    finalUrl = finalUrl.replace("/raw/upload/", "/raw/upload/fl_attachment/");
                }

                // عرض البيانات في الصندوق العالمي لقراءة الرابط من أي مكان
                resFileName.textContent = file.name;
                fileUrl.textContent = finalUrl;
                
                // ربط زر التنزيل بالملف
                downloadLink.href = finalUrl;
                downloadLink.setAttribute('download', file.name);
                
                resultBox.style.display = "block";
            } else {
                uploadStatus.innerHTML = "<span style='color: red;'>❌ فشل الرفع، يرجى التحقق من إعدادات الـ Preset.</span>";
            }
        })
        .catch(err => {
            console.error(err);
            uploadStatus.innerHTML = "<span style='color: red;'>❌ حدث خطأ في الاتصال بالسحابة.</span>";
        });
    });

    // ميزة نسخ الرابط السريعة لإرساله للأجهزة الأخرى
    copyBtn.addEventListener('click', function() {
        const textToCopy = fileUrl.textContent;
        navigator.clipboard.writeText(textToCopy).then(() => {
            alert("تم نسخ الرابط بنجاح! يمكنك إرساله الآن لأي جهاز آخر لفتح وتنزيل الملف فوراً.");
        });
    });
</script>

</body>
</html>
