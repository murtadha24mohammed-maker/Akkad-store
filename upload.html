<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخزن الملفات السحابي المفتوح</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 600px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        h2 { color: #1055c0; margin-bottom: 25px; }
        .file-label {
            display: inline-block;
            padding: 14px 28px;
            background-color: #1055c0;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .file-label:hover { background-color: #0c3d8a; }
        input[type="file"] { display: none; }
        
        .gallery {
            margin-top: 30px;
            text-align: right;
        }
        .gallery-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            border-bottom: 2px solid #1055c0;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }
        .file-card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .file-icon {
            font-size: 35px;
            margin-left: 15px;
        }
        .file-details {
            flex-grow: 1;
            margin-right: 15px;
            text-align: right;
        }
        .file-name {
            font-weight: bold;
            font-size: 14px;
            color: #222;
            word-break: break-all;
        }
        .download-btn {
            background-color: #28a745;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
        .download-btn:hover { background-color: #1e7e34; }
        .status { margin-top: 15px; color: #666; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>☁️ مخزن الملفات السحابي العام (جميع الأحجام)</h2>
    <p style="color: #666; font-size: 14px;">ارفع أي ملف (RAR, PDF, TXT, DOCX, صور) بأي حجم كان، وسيتم حفظه دائمًا.</p>
    
    <label for="cloudInput" class="file-label">اضغط هنا لرفع ملف 📤</label>
    <input type="file" id="cloudInput" accept=".rar, .zip, .pdf, .txt, .doc, .docx, image/*">
    <div class="status" id="uploadStatus"></div>

    <div class="gallery">
        <div class="gallery-title">الملفات المخزنة سحابياً على الموقع:</div>
        <div id="filesList"></div>
    </div>
</div>

<script>
    // 🚨 تذكير: استبدل هذه الإعدادات بمعلومات حسابك الشخصي في Cloudinary لكي يعمل الرفع بشكل دائم
    const CLOUD_NAME = "dbfonerwr"; 
    const UPLOAD_PRESET = "cwxgcdkw"; 

    const cloudInput = document.getElementById('cloudInput');
    const uploadStatus = document.getElementById('uploadStatus');
    const filesList = document.getElementById('filesList');

    // استرجاع وعرض الملفات من الذاكرة المحلية للموقع
    function loadSavedFiles() {
        filesList.innerHTML = '';
        const savedFiles = JSON.parse(localStorage.getItem('cloud_docs')) || [];
        
        if (savedFiles.length === 0) {
            filesList.innerHTML = '<p style="color: #999; text-align: center;">لا توجد ملفات مرفوعة حالياً.</p>';
            return;
        }

        savedFiles.forEach(file => {
            const card = document.createElement('div');
            card.className = 'file-card';
            card.innerHTML = `
                <div class="file-icon">📄</div>
                <div class="file-details">
                    <div class="file-name">${file.name}</div>
                    <a href="${file.url}" target="_blank" style="color: #1055c0; font-size: 12px; text-decoration: none;">رابط الملف السحابي 🌐</a>
                </div>
                <a href="${file.url}" download="${file.name}" target="_blank" class="download-btn">تنزيل 📥</a>
            `;
            filesList.appendChild(card);
        });
    }

    loadSavedFiles();

    cloudInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // تم إزالة شرط الحجم تماماً؛ والآن يظهر حجم الملف المرفوع للعلم فقط
        const fileSizeKB = (file.size / 1024).toFixed(1);
        uploadStatus.innerHTML = `⏳ جاري رفع الملف (${fileSizeKB} KB) وتأمينه على السيرفر السحابي...`;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        // إرسال الملف مباشرة للسيرفر السحابي لحفظه للأبد
        fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/raw/upload`, {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.secure_url) {
                uploadStatus.innerHTML = "<span style='color: green;'>✅ تم تخزين الملف بنجاح دائم!</span>";
                
                const savedFiles = JSON.parse(localStorage.getItem('cloud_docs')) || [];
                savedFiles.unshift({
                    name: file.name,
                    url: data.secure_url
                });
                localStorage.setItem('cloud_docs', JSON.stringify(savedFiles));
                
                loadSavedFiles();
            } else {
                uploadStatus.innerHTML = "<span style='color: red;'>❌ فشل الرفع، يرجى التحقق من إعدادات حسابك.</span>";
            }
        })
        .catch(err => {
            console.error(err);
            uploadStatus.innerHTML = "<span style='color: red;'>❌ حدث خطأ في الاتصال بالشبكة السحابية.</span>";
        });
    });
</script>

</body>
</html>
