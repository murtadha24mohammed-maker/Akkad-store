<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخزن الملفات الدائم</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 600px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        h2 { color: #1055c0; margin-bottom: 25px; }
        .file-label {
            display: inline-block;
            padding: 14px 28px;
            background-color: #1055c0;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .file-label:hover { background-color: #0c3d8a; }
        input[type="file"] { display: none; }
        
        /* قائمة الملفات المحفوظة دائمًا */
        .gallery {
            margin-top: 30px;
            text-align: right;
        }
        .gallery-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            border-bottom: 2px solid #1055c0;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }
        .file-card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .file-preview {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #ddd;
        }
        .file-details {
            flex-grow: 1;
            margin-right: 15px;
            text-align: right;
        }
        .file-name {
            font-weight: bold;
            font-size: 14px;
            color: #222;
            word-break: break-all;
        }
        .download-btn {
            background-color: #28a745;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
        .download-btn:hover { background-color: #1e7e34; }
        .status { margin-top: 10px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
<a href="page 9.html" style="padding: 6px 12px; background-color: #00bfff; color: white; text-decoration: none; border-radius: 10px;"><b> من نحن  </b></a>&nbsp;

<div class="container">
    <h2>☁️ مخزن الصور والملفات السحابي الدائم</h2>
    <p style="color: #666; font-size: 14px;">ارفع أي صورة هنا ليتم تخزينها على الإنترنت فوراً والحصول على رابط تحميل دائم من أي جهاز.</p>
    
    <label for="cloudInput" class="file-label">اضغط هنا لرفع ملف أو صورة 📤</label>
    <input type="file" id="cloudInput" accept="image/*">
    <div class="status" id="uploadStatus"></div>

    <div class="gallery">
        <div class="gallery-title">الملفات المخزنة سحابياً على الموقع:</div>
        <div id="filesList">
            </div>
    </div>
</div>

<script>
    // الإعدادات المجانية الخاصة بالرفع السحابي الدائم (Cloudinary Setup)
    // ملاحظة: هذه إعدادات عامة تجريبية مجانية، يفضل لاحقاً إنشاء حسابك الخاص لوضع اسمك الخاص.
    const CLOUD_NAME = "demo"; 
    const UPLOAD_PRESET = "docs_upload_example_preset"; 

    const cloudInput = document.getElementById('cloudInput');
    const uploadStatus = document.getElementById('uploadStatus');
    const filesList = document.getElementById('filesList');

    // دالة لتحديث القائمة وعرض الملفات المحفوظة من الذاكرة الدائمة
    function loadSavedFiles() {
        filesList.innerHTML = '';
        // استرجاع الروابط المحفوظة من ذاكرة المتصفح المحلية
        const savedFiles = JSON.parse(localStorage.getItem('cloud_files')) || [];
        
        if (savedFiles.length === 0) {
            filesList.innerHTML = '<p style="color: #999; text-align: center;">لا توجد ملفات مرفوعة حالياً.</p>';
            return;
        }

        savedFiles.forEach(file => {
            const card = document.createElement('div');
            card.className = 'file-card';
            card.innerHTML = `
                <img class="file-preview" src="${file.url}" alt="Preview">
                <div class="file-details">
                    <div class="file-name">${file.name}</div>
                    <a href="${file.url}" target="_blank" style="color: #1055c0; font-size: 12px; text-decoration: none;">رابط الملف الدائم 🌐</a>
                </div>
                <a href="${file.url}" download="${file.name}" target="_blank" class="download-btn">تنزيل 📥</a>
            `;
            filesList.appendChild(card);
        });
    }

    // استدعاء الملفات المرفوعة تلقائياً بمجرد فتح الصفحة في المتصفح
    loadSavedFiles();

    // الاستماع لحدث اختيار ملف وتوجيهه فوراً إلى السيرفر السحابي
    cloudInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        uploadStatus.innerHTML = "⏳ جاري رفع الملف وتخزينه سحابياً، يرجى الانتظار...";

        // تجهيز الملف لإرساله عبر بروتوكول HTTP كمستند مرفوع لقاعدة البيانات
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        // إرسال الملف برمجياً إلى السيرفر السحابي لحفظه للأبد
        fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.secure_url) {
                uploadStatus.innerHTML = "<span style='color: green; font-weight: bold;'>✅ تم الرفع والتخزين بنجاح دائم!</span>";

            
                // حفظ الرابط الدائم الجديد في ذاكرة الموقع
                const savedFiles = JSON.parse(localStorage.getItem('cloud_files')) || [];
                savedFiles.unshift({
                    name: file.name,
                    url: data.secure_url // الرابط العالمي المباشر للصورة التي لن تحذف أبداً
                });
                localStorage.setItem('cloud_files', JSON.stringify(savedFiles));
                
                // إعادة تحديث الواجهة لعرض الصورة المرفوعة فوراً
                loadSavedFiles();
            } else {
                uploadStatus.innerHTML = "<span style='color: red;'>❌ فشل الرفع السحابي، تأكد من حجم الملف.</span>";
            }
        })
        .catch(err => {
            console.error(err);
            uploadStatus.innerHTML = "<span style='color: red;'>❌ حدث خطأ أثناء الاتصال بالسيرفر السحابي.</span>";
        });
    });
</script>

</body>
</html>
